<!DOCTYPE html>
<html>
<head>

<title>HANSEOUL FOOD</title>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{

margin:0;

font-family:Arial;

background:#0b0d14;

color:white;

}

.hero{

padding:80px;

text-align:center;

background:

linear-gradient(
90deg,
#111827,
#ff4b6e
);

}

.hero h1{

font-size:50px;

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(250px,1fr));

gap:20px;

padding:30px;

}

.card{

background:#1a1f2b;

border-radius:20px;

overflow:hidden;

}

.card img{

width:100%;

height:220px;

object-fit:cover;

}

.content{

padding:15px;

}

button{

width:100%;

padding:12px;

background:#ff4b6e;

border:none;

color:white;

border-radius:12px;

}

.cart{

position:fixed;

right:20px;

top:20px;

width:220px;

background:#111827;

padding:20px;

border-radius:20px;

}

</style>

</head>

<body>

<div class="hero">

<h1>

🇰🇷 HANSEOUL

</h1>

<p>

Korean • Sushi • Drinks

</p>

</div>

<div class="grid"
id="menu">

</div>

<div class="cart">

<h3>

🛒 Keranjang

</h3>

<div id="cart">

Kosong

</div>

</div>

<script>

const menu=[

[
"Korean Chicken",
45000,
"https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec"
],

[
"Ramyeon",
35000,
"https://images.unsplash.com/photo-1553163147-622ab57be1c7"
],

[
"Salmon Sushi",
55000,
"https://images.unsplash.com/photo-1579871494447-9811cf80d66c"
],

[
"Matcha Latte",
25000,
"https://images.unsplash.com/photo-1515823064-d6e0c04616a7"
]

];

let cart=[];

menu.forEach(x=>{

document
.getElementById(
"menu"
)
.innerHTML+=`

<div class="card">

<img src="${x[2]}">

<div class="content">

<h2>

${x[0]}

</h2>

<p>

Rp${x[1].toLocaleString()}

</p>

<button
onclick="
order(
'${x[0]}'
)
">

Order

</button>

</div>

</div>

`;

});

function order(nama){

cart.push(nama);

document
.getElementById(
"cart"
)
.innerHTML=

cart.join(
"<br>"
);

}

</script>

</body>

</html>
