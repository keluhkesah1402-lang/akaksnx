<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>HANSEOUL — Korean • Sushi • Drinks</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0d1117;
color:white;
}

header{

height:420px;

display:flex;

align-items:center;

padding:60px;

background:
linear-gradient(
90deg,
rgba(0,0,0,.8),
rgba(0,0,0,.2)
),

url("https://images.unsplash.com/photo-1555126634-323283e090fa");

background-size:cover;
background-position:center;

}

.hero h1{
font-size:64px;
}

.hero p{
margin-top:15px;
}

.hero button{

margin-top:30px;

padding:16px 32px;

border:none;

background:#ff5252;

color:white;

border-radius:16px;

cursor:pointer;

}

.container{

display:grid;

grid-template-columns:3fr 1fr;

gap:30px;

padding:40px;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}

.card{

background:#161b22;

border-radius:22px;

overflow:hidden;

transition:.3s;

}

.card:hover{

transform:
translateY(-8px);

}

.card img{

width:100%;
height:220px;

object-fit:cover;

}

.info{

padding:20px;

}

.price{

margin-top:10px;

color:#ffc857;

font-size:24px;

}

.order{

margin-top:16px;

width:100%;

padding:14px;

border:none;

background:#ff5252;

color:white;

border-radius:12px;

cursor:pointer;

}

.cart{

background:#161b22;

padding:25px;

border-radius:20px;

height:max-content;

position:sticky;

top:20px;

}

.item{

background:#222a35;

padding:15px;

border-radius:14px;

margin-top:15px;

}

.qty{

display:flex;

gap:10px;

margin-top:10px;

}

.qty button{

width:36px;
height:36px;

border:none;

border-radius:10px;

cursor:pointer;

}

.total{

margin-top:25px;

font-size:28px;

color:#ff5252;

}

.checkout{

margin-top:20px;

width:100%;

padding:16px;

border:none;

background:#ff5252;

color:white;

border-radius:16px;

cursor:pointer;

}

h2{
margin:20px 0;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

header{
height:auto;
}

.hero h1{
font-size:42px;
}

}

</style>

</head>

<body>

<header>

<div class="hero">

<h1>
HANSEOUL
</h1>

<p>
Korean Food • Sushi • Premium Drinks
</p>

<button
onclick="
document
.getElementById(
'menu'
)
scrollIntoView()
"
>

Explore

</button>

</div>

</header>

<div class="container">

<div>

<h2 id="menu">
🔥 Menu
</h2>

<div
class="grid"
id="foods">
</div>

</div>

<div>

<div class="cart">

<h2>
🛒 Keranjang
</h2>

<div id="cart">

Belum ada pesanan

</div>

<div
class="total"
id="total">

Rp0

</div>

<button
class="checkout"
onclick="checkout()">

Checkout

</button>

</div>

</div>

</div>

<script>

const data=[

[
"Korean Chicken",
45000,
"https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec"
],

[
"Ramyeon",
35000,
"https://images.unsplash.com/photo-1553163147-622ab57be1c7"
],

[
"Tteokbokki",
38000,
"https://images.unsplash.com/photo-1590301157890-4810ed352733"
],

[
"Bibimbap",
42000,
"https://images.unsplash.com/photo-1512058564366-18510be2db19"
],

[
"Salmon Sushi",
55000,
"https://images.unsplash.com/photo-1579871494447-9811cf80d66c"
],

[
"Dragon Roll",
62000,
"https://images.unsplash.com/photo-1553621042-f6e147245754"
],

[
"Strawberry Milk",
22000,
"https://images.unsplash.com/photo-1544145945-f90425340c7e"
],

[
"Matcha Latte",
25000,
"https://images.unsplash.com/photo-1515823064-d6e0c04616a7"
],

[
"Brown Sugar Boba",
26000,
"https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd"
],

[
"Yuzu Lemon",
23000,
"https://images.unsplash.com/photo-1499636136210-6f4ee915583e"
]

];

const foods=
document.getElementById(
"foods"
);

data.forEach(
(x)=>{

foods.innerHTML+=`

<div class="card">

<img
src="${x[2]}">

<div class="info">

<h2>
${x[0]}
</h2>

<div class="price">

Rp${x[1].toLocaleString()}

</div>

<button
class="order"

onclick="addItem(
'${x[0]}',
${x[1]}
)"

>

Order

</button>

</div>

</div>

`;

});

let cart=[];

function addItem(name,price){

let item=
cart.find(
x=>
x.name===name
);

if(item){

item.qty++;

}

else{

cart.push({

name,

price,

qty:1

});

}

render();

}

function render(){

const box=
document.getElementById(
"cart"
);

box.innerHTML="";

let total=0;

if(
cart.length===0
){

box.innerHTML=
"Belum ada pesanan";

}

cart.forEach(
(item,i)=>{

total+=
item.price*
item.qty;

box.innerHTML+=`

<div class="item">

<b>
${item.name}
</b>

<br>

Rp${item.price.toLocaleString()}

<div class="qty">

<button
onclick="
minus(
${i}
)
">

−

</button>

<span>

${item.qty}

</span>

<button
onclick="
plus(
${i}
)
">

+

</button>

<button
onclick="
removeItem(
${i}
)
">

🗑️

</button>

</div>

</div>

`;

});

document
.getElementById(
"total"
)

.innerHTML=

"Rp"+

total.toLocaleString();

}

function plus(i){

cart[i].qty++;

render();

}

function minus(i){

cart[i].qty--;

if(
cart[i].qty<=0
){

cart.splice(
i,
1
);

}

render();

}

function removeItem(i){

cart.splice(
i,
1
);

render();

}

function checkout(){

if(
cart.length===0
){

alert(
"Keranjang kosong"
);

return;

}

alert(
"Pesanan berhasil dibuat 🎉"
);

cart=[];

render();

}

</script>

</body>
</html>
